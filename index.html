<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metria — Wealth Management</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { iosBlue: '#007AFF', metriaGold: '#D4AF37' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f5f5f7; overflow-x: hidden; }
        
        /* Glassmorphism Core */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        /* Animated Background Blobs */
        .blob-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .blob { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 20s infinite alternate; }
        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 15%); } }

        .sidebar-active { background: rgba(0, 0, 0, 0.05); color: #000; font-weight: 700; }
        .card-apple { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .card-apple:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="flex min-h-screen text-slate-900">

    <div class="blob-container">
        <div class="blob" style="top: -100px; left: -100px; background: #c7d2fe;"></div>
        <div class="blob" style="bottom: -100px; right: -100px; background: #fae8ff;"></div>
    </div>

    <aside id="sidebar" class="w-64 glass m-4 mr-0 rounded-[2rem] hidden md:flex flex-col sticky top-4 h-[calc(100vh-2rem)] z-50">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10 pl-2">
                <div class="w-10 h-10 bg-black text-white rounded-2xl flex items-center justify-center font-bold shadow-2xl">M</div>
                <h1 class="text-xl font-bold tracking-tight">Metria</h1>
            </div>

            <nav class="space-y-2 hidden-auth">
                <button onclick="mudarAba('geral')" id="btn-geral" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium text-slate-500 hover:bg-white/50 transition-all sidebar-active">
                    <i class="fas fa-grid-2 w-5"></i> Fluxo
                </button>
                <button onclick="mudarAba('investimentos')" id="btn-investimentos" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium text-slate-500 hover:bg-white/50 transition-all">
                    <i class="fas fa-chart-line w-5"></i> Carteira
                </button>
                <button onclick="mudarAba('perfil')" id="btn-perfil" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium text-slate-500 hover:bg-white/50 transition-all">
                    <i class="fas fa-bullseye w-5"></i> Metas
                </button>
            </nav>
        </div>

        <div class="mt-auto p-4 hidden-auth">
            <div class="glass bg-white/40 p-3 rounded-2xl flex items-center gap-3 border-none shadow-sm">
                <img id="user-photo" src="" class="w-9 h-9 rounded-full hidden border-2 border-white">
                <div id="user-initial" class="w-9 h-9 rounded-full bg-black text-white flex items-center justify-center text-xs font-bold">U</div>
                <div class="overflow-hidden">
                    <p id="desk-user-name" class="text-[10px] font-bold truncate"></p>
                    <button onclick="fazerLogout()" class="text-[9px] text-iosBlue font-bold uppercase">Sair</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-10">
        
        <div id="auth-container" class="max-w-sm mx-auto mt-32 text-center animate-pulse">
            <div class="glass p-10 rounded-[3rem] shadow-2xl">
                <div class="w-16 h-16 bg-black text-white rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl font-bold">M</div>
                <h2 class="text-2xl font-bold mb-8">Wealth Management</h2>
                <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-black text-white py-4 rounded-2xl font-semibold text-sm hover:scale-[1.02] active:scale-95 transition-all shadow-xl">
                    <i class="fab fa-google"></i> Acessar com Google
                </button>
            </div>
        </div>

        <div id="app-content" class="hidden-auth hidden space-y-8">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-4">
                <div>
                    <h2 id="main-title" class="text-4xl font-black tracking-tight text-slate-900">Dashboard</h2>
                    <p id="main-subtitle" class="text-slate-500 text-sm mt-1">Visão holística do seu patrimônio.</p>
                </div>
                <div class="flex items-center gap-2 glass p-2 rounded-2xl shadow-sm border-none">
                    <button onclick="navegarMes(-1)" class="w-9 h-9 hover:bg-white rounded-xl transition-all"><i class="fas fa-chevron-left text-xs"></i></button>
                    <span id="lbl-mes-atual" class="text-xs font-bold px-4 min-w-[140px] text-center capitalize">Maio 2026</span>
                    <button onclick="navegarMes(1)" class="w-9 h-9 hover:bg-white rounded-xl transition-all"><i class="fas fa-chevron-right text-xs"></i></button>
                </div>
            </div>

            <div id="aba-geral" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-8 rounded-[2.5rem] card-apple">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Patrimônio Consolidado</p>
                        <h3 id="saldo-total" class="text-3xl font-bold tracking-tighter">R$ 0,00</h3>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] card-apple">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Receitas (Mês)</p>
                        <h3 id="total-receitas" class="text-3xl font-bold text-emerald-600 tracking-tighter">R$ 0,00</h3>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] card-apple">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Despesas (Mês)</p>
                        <h3 id="total-despesas" class="text-3xl font-bold text-rose-600 tracking-tighter">R$ 0,00</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass p-8 rounded-[2.5rem]">
                        <h4 class="font-bold mb-6 text-sm opacity-50">NOVA TRANSAÇÃO</h4>
                        <form onsubmit="adicionarTransacao(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="desc" required placeholder="Título" class="md:col-span-2 p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5 focus:bg-white focus:ring-black/20">
                            <input type="number" step="0.01" id="valor" required placeholder="Valor R$" class="p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5 focus:bg-white">
                            <select id="tipo-mov" class="p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5">
                                <option value="despesa">Despesa</option><option value="receita">Receita</option>
                            </select>
                            <select id="cat" class="p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5">
                                <option>Moradia</option><option>Alimentação</option><option>Transporte</option><option>Lazer</option><option>Renda</option>
                            </select>
                            <input type="date" id="data-mov" required class="p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5">
                            <button class="md:col-span-2 bg-black text-white font-bold py-4 rounded-2xl hover:scale-[1.01] transition-all shadow-lg">Confirmar Lançamento</button>
                        </form>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] flex flex-col items-center justify-center">
                        <div class="w-full max-w-[200px]"><canvas id="chartGastos"></canvas></div>
                        <p class="text-[10px] font-black text-slate-400 mt-6 tracking-widest uppercase">Gastos por Categoria</p>
                    </div>
                </div>

                <div class="glass rounded-[2.5rem] overflow-hidden">
                    <table class="w-full text-left text-sm"><tbody id="lista-transacoes" class="divide-y divide-black/5"></tbody></table>
                </div>
            </div>

            <div id="aba-investimentos" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[2.5rem]">
                        <h4 class="font-bold mb-6 text-sm opacity-50">ADICIONAR ATIVO</h4>
                        <form onsubmit="adicionarAtivo(event)" class="space-y-4">
                            <input type="text" id="ativo-ticker" required placeholder="Ticker (ex: BTC, AAPL)" class="w-full p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5 uppercase">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="ativo-qtd" required placeholder="Qtd" class="p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5">
                                <input type="number" step="0.01" id="ativo-preco" required placeholder="Preço" class="p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5">
                            </div>
                            <select id="ativo-tipo" class="w-full p-4 bg-white/40 rounded-2xl text-sm border-none ring-1 ring-black/5">
                                <option>Ações</option><option>Cripto</option><option>FIIs</option><option>Renda Fixa</option>
                            </select>
                            <button class="w-full bg-black text-white font-bold py-4 rounded-2xl shadow-xl">Salvar na Carteira</button>
                        </form>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem] flex items-center justify-center">
                        <div class="w-full max-w-[220px]"><canvas id="chartInvest"></canvas></div>
                    </div>
                </div>
                <div class="glass rounded-[2.5rem] overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-black/5 text-[10px] font-black uppercase text-slate-400"><tr class="border-b border-black/5"><th class="p-5">Ativo</th><th class="p-5">Tipo</th><th class="p-5">Qtd</th><th class="p-5 text-right">Total</th><th class="p-5"></th></tr></thead>
                        <tbody id="lista-ativos" class="divide-y divide-black/5"></tbody>
                    </table>
                </div>
            </div>

            <div id="aba-perfil" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[2.5rem]">
                        <h4 class="font-bold mb-6 text-sm opacity-50">PERFIL FINANCEIRO</h4>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Renda Mensal Sugerida (R$)</label>
                        <input type="number" id="perfil-renda" class="w-full p-4 bg-white/40 rounded-2xl text-2xl font-bold mb-6 border-none ring-1 ring-black/5">
                        <button onclick="salvarPerfil()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">Atualizar Metrias</button>
                    </div>
                    <div class="glass p-8 rounded-[2.5rem]">
                        <h4 class="font-bold mb-6 text-sm opacity-50">OBJETIVOS PATRIMONIAIS</h4>
                        <div id="container-metas" class="space-y-6"></div>
                        <div class="mt-8 pt-8 border-t border-black/5 flex gap-2">
                            <input type="text" id="meta-nome" placeholder="Meta" class="flex-1 p-3 bg-white/40 rounded-xl text-xs border-none ring-1 ring-black/5">
                            <input type="number" id="meta-valor" placeholder="Alvo R$" class="w-24 p-3 bg-white/40 rounded-xl text-xs border-none ring-1 ring-black/5">
                            <button onclick="adicionarMeta()" class="bg-black text-white px-4 rounded-xl text-xs"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyAaAaFP6gC4nOuj4R1c4HZhPZo5ffHqUI4",
            authDomain: "financasapp-5de18.firebaseapp.com",
            projectId: "financasapp-5de18",
            storageBucket: "financasapp-5de18.firebasestorage.app",
            messagingSenderId: "789455207825",
            appId: "1:789455207825:web:bd1e9cce13a313b4fc2e30"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let user = null, transacoes = [], ativos = [], metas = [], perfil = {};
        let dataFiltro = new Date(), chartGastos = null, chartInvest = null;

        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function fazerLogout() { auth.signOut(); window.location.reload(); }

        auth.onAuthStateChanged(u => {
            user = u;
            document.getElementById('auth-container').classList.toggle('hidden', !!u);
            document.getElementById('app-content').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('desk-user-name').innerText = u.displayName;
                if(u.photoURL) { 
                    const img = document.getElementById('user-photo');
                    img.src = u.photoURL; img.classList.remove('hidden');
                    document.getElementById('user-initial').classList.add('hidden');
                }
                syncData();
            }
        });

        function mudarAba(aba) {
            ['geral', 'investimentos', 'perfil'].forEach(a => {
                document.getElementById(`aba-${a}`).classList.toggle('hidden', a !== aba);
                document.getElementById(`btn-${a}`).classList.toggle('sidebar-active', a === aba);
            });
            const titulos = { geral: ['Dashboard', 'Seu patrimônio consolidado.'], investimentos: ['Carteira', 'Ativos sob gestão.'], perfil: ['Objetivos', 'Seu planejamento estratégico.'] };
            document.getElementById('main-title').innerText = titulos[aba][0];
            document.getElementById('main-subtitle').innerText = titulos[aba][1];
        }

        function syncData() {
            db.collection("transacoes").where("uid", "==", user.uid).onSnapshot(s => {
                transacoes = s.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI();
            });
            db.collection("ativos").where("uid", "==", user.uid).onSnapshot(s => {
                ativos = s.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI();
            });
            db.collection("perfil").doc(user.uid).onSnapshot(doc => {
                if(doc.exists) {
                    perfil = doc.data();
                    document.getElementById('perfil-renda').value = perfil.renda || '';
                    metas = perfil.metas || [];
                    renderMetas();
                }
            });
            document.getElementById('data-mov').valueAsDate = new Date();
        }

        function adicionarTransacao(e) {
            e.preventDefault();
            db.collection("transacoes").add({
                uid: user.uid,
                desc: document.getElementById('desc').value,
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo-mov').value,
                cat: document.getElementById('cat').value,
                data: document.getElementById('data-mov').value
            }).then(() => e.target.reset());
        }

        function adicionarAtivo(e) {
            e.preventDefault();
            db.collection("ativos").add({
                uid: user.uid,
                ticker: document.getElementById('ativo-ticker').value.toUpperCase(),
                qtd: parseFloat(document.getElementById('ativo-qtd').value),
                preco: parseFloat(document.getElementById('ativo-preco').value),
                tipo: document.getElementById('ativo-tipo').value
            }).then(() => e.target.reset());
        }

        function adicionarMeta() {
            const n = document.getElementById('meta-nome').value, v = parseFloat(document.getElementById('meta-valor').value);
            if(n && v) {
                metas.push({ nome: n, valor: v });
                db.collection("perfil").doc(user.uid).set({ metas }, { merge: true });
                document.getElementById('meta-nome').value = ''; document.getElementById('meta-valor').value = '';
            }
        }

        function salvarPerfil() {
            const r = document.getElementById('perfil-renda').value;
            db.collection("perfil").doc(user.uid).set({ renda: r }, { merge: true });
        }

        function navegarMes(dir) { dataFiltro.setMonth(dataFiltro.getMonth() + dir); updateUI(); }

        function updateUI() {
            const m = dataFiltro.getMonth(), y = dataFiltro.getFullYear();
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            document.getElementById('lbl-mes-atual').innerText = `${meses[m]} ${y}`;

            let patrimônio = 0, rec = 0, des = 0, catMap = {}, invMap = {};

            const listaT = document.getElementById('lista-transacoes'); listaT.innerHTML = '';
            transacoes.forEach(t => {
                if(t.tipo === 'receita') patrimônio += t.valor; else patrimônio -= t.valor;
                const dt = t.data.split('-');
                if(parseInt(dt[1]) === (m+1) && parseInt(dt[0]) === y) {
                    if(t.tipo === 'receita') rec += t.valor; else { des += t.valor; catMap[t.cat] = (catMap[t.cat] || 0) + t.valor; }
                    listaT.innerHTML += `<tr class="p-4 hover:bg-black/5 transition"><td class="p-5 font-bold">${t.desc}</td><td class="p-5 text-slate-400 text-[10px] font-bold uppercase">${t.cat}</td><td class="p-5 text-right font-black ${t.tipo === 'receita' ? 'text-emerald-600' : 'text-rose-600'}">R$ ${t.valor.toLocaleString('pt-BR')}</td><td class="p-5 text-right"><button onclick="db.collection('transacoes').doc('${t.id}').delete()"><i class="fas fa-times opacity-20 hover:opacity-100"></i></button></td></tr>`;
                }
            });

            const listaA = document.getElementById('lista-ativos'); listaA.innerHTML = '';
            ativos.forEach(a => {
                const tot = a.qtd * a.preco; patrimônio += tot;
                invMap[a.tipo] = (invMap[a.tipo] || 0) + tot;
                listaA.innerHTML += `<tr class="hover:bg-black/5 transition"><td class="p-5 font-black">${a.ticker}</td><td class="p-5 text-xs text-slate-400">${a.tipo}</td><td class="p-5 font-medium">${a.qtd}</td><td class="p-5 text-right font-black">R$ ${tot.toLocaleString('pt-BR')}</td><td class="p-5 text-right"><button onclick="db.collection('ativos').doc('${a.id}').delete()"><i class="fas fa-trash opacity-10"></i></button></td></tr>`;
            });

            document.getElementById('saldo-total').innerText = `R$ ${patrimônio.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-receitas').innerText = `R$ ${rec.toFixed(2)}`;
            document.getElementById('total-despesas').innerText = `R$ ${des.toFixed(2)}`;

            renderCharts(catMap, invMap);
            renderMetas(patrimônio);
        }

        function renderCharts(gastos, invest) {
            const config = (id, map, colors) => {
                const c = document.getElementById(id).getContext('2d');
                return new Chart(c, { type: 'doughnut', data: { labels: Object.keys(map), datasets: [{ data: Object.values(map), backgroundColor: colors, borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { display: false } } } });
            }
            if(chartGastos) chartGastos.destroy(); if(chartInvest) chartInvest.destroy();
            chartGastos = config('chartGastos', gastos, ['#000', '#888', '#007AFF', '#5856D6']);
            chartInvest = config('chartInvest', invest, ['#000', '#FF9500', '#34C759', '#AF52DE']);
        }

        function renderMetas(patrimonio) {
            const cont = document.getElementById('container-metas');
            cont.innerHTML = metas.length ? '' : '<p class="text-[10px] text-slate-400 font-bold uppercase">Sem objetivos definidos.</p>';
            metas.forEach(m => {
                const p = Math.min((patrimonio / m.valor) * 100, 100).toFixed(1);
                cont.innerHTML += `<div><div class="flex justify-between mb-2 text-[10px] font-black uppercase"><span>${m.nome}</span><span>${p}%</span></div><div class="w-full bg-black/5 h-2 rounded-full overflow-hidden"><div class="bg-black h-full transition-all duration-1000" style="width: ${p}%"></div></div></div>`;
            });
        }
    </script>
</body>
</html>
