<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças App - Nuvem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { appbg: '#f8fafc', cardbg: '#ffffff' } }
            }
        }
    </script>
</head>
<body class="bg-appbg text-slate-700 font-sans min-h-screen pb-12">

    <header class="bg-slate-900 text-white py-6 shadow-md">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide"><i class="fas fa-wallet text-emerald-400 mr-2"></i> Finanças<span class="text-emerald-400">App</span></h1>
            
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="user-email" class="text-xs text-slate-400 hidden sm:inline"></span>
                <button onclick="fazerLogout()" class="text-xs bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white px-3 py-1.5 rounded-lg border border-rose-500/30 transition duration-150">
                    <i class="fas fa-sign-out-alt mr-1"></i> Sair
                </button>
            </div>
            <span id="badge-offline" class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700">Desconectado</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        
        <section id="tela-login" class="max-w-md mx-auto bg-cardbg p-8 rounded-2xl shadow-sm border border-slate-100 mt-12">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Acesse sua Conta</h2>
                <p class="text-xs text-slate-400 mt-1">Sincronize suas finanças em todos os dispositivos</p>
            </div>

            <form id="form-auth" onsubmit="processarAutenticacao(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Senha</label>
                    <input type="password" id="senha" required placeholder="••••••••" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-500">
                </div>

                <div class="pt-2">
                    <button type="submit" id="btn-login" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-lg text-sm transition duration-150 shadow-sm">
                        Entrar
                    </button>
                    <button type="button" onclick="criarConta()" class="w-full mt-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 font-medium py-2.5 rounded-lg text-sm transition duration-150 border border-emerald-200">
                        Criar Nova Conta
                    </button>
                </div>
                <p id="msg-erro" class="text-xs text-rose-500 text-center hidden"></p>
            </form>
        </section>

        <div id="painel-sistema" class="hidden">
            
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-cardbg p-6 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center border-l-4 border-indigo-500">
                    <div>
                        <p class="text-sm text-slate-400 uppercase font-semibold">Saldo Atual</p>
                        <h2 class="text-3xl font-bold text-slate-800 mt-1" id="saldo-total">R$ 0,00</h2>
                    </div>
                    <div class="bg-indigo-50 p-4 rounded-full text-indigo-500"><i class="fas fa-university text-xl"></i></div>
                </div>
                <div class="bg-cardbg p-6 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center border-l-4 border-emerald-500">
                    <div>
                        <p class="text-sm text-slate-400 uppercase font-semibold">Receitas</p>
                        <h2 class="text-3xl font-bold text-emerald-600 mt-1" id="total-receitas">R$ 0,00</h2>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-full text-emerald-500"><i class="fas fa-arrow-trend-up text-xl"></i></div>
                </div>
                <div class="bg-cardbg p-6 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center border-l-4 border-rose-500">
                    <div>
                        <p class="text-sm text-slate-400 uppercase font-semibold">Despesas</p>
                        <h2 class="text-3xl font-bold text-rose-600 mt-1" id="total-despesas">R$ 0,00</h2>
                    </div>
                    <div class="bg-rose-50 p-4 rounded-full text-rose-500"><i class="fas fa-arrow-trend-down text-xl"></i></div>
                </div>
            </section>

            <section class="mb-8">
                <h3 class="text-lg font-semibold text-slate-800 mb-4"><i class="fas fa-piggy-bank mr-2 text-slate-400"></i>Saldo por Conta</h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="lista-bancos"></div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                <div class="bg-cardbg p-6 rounded-xl shadow-sm border border-slate-100 lg:col-span-2">
                    <h3 class="text-lg font-semibold text-slate-800 mb-4"><i class="fas fa-plus-circle mr-2 text-emerald-500"></i>Nova Transação</h3>
                    <form id="form-transacao" onsubmit="adicionarTransacaoNuvem(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Descrição</label>
                            <input type="text" id="desc" required placeholder="Ex: Mercado, Salário" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" required placeholder="0.00" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Tipo</label>
                            <select id="tipo" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                                <option value="despesa">Despesa Saída (-)</option>
                                <option value="receita">Receita Entrada (+)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Categoria</label>
                            <select id="categoria" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                                <option value="Alimentação">Alimentação</option>
                                <option value="Moradia">Moradia</option>
                                <option value="Transporte">Transporte</option>
                                <option value="Lazer">Lazer</option>
                                <option value="Salário/Renda">Salário/Renda</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Conta/Banco</label>
                            <select id="banco" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                                <option value="Nubank">Nubank</option>
                                <option value="Itaú">Itaú</option>
                                <option value="Inter">Banco Inter</option>
                                <option value="Carteira">Carteira</option>
                            </select>
                        </div>
                        <div class="md:col-span-2 mt-2">
                            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-lg transition text-sm">Registrar Transação</button>
                        </div>
                    </form>
                </div>

                <div class="bg-cardbg p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                    <h3 class="text-lg font-semibold text-slate-800 mb-4 self-start"><i class="fas fa-chart-pie mr-2 text-indigo-500"></i>Categorias</h3>
                    <div class="w-full max-w-[220px]"><canvas id="graficoCategorias"></canvas></div>
                </div>
            </div>

            <div class="bg-cardbg rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-5 border-b border-slate-100"><h3 class="text-lg font-semibold text-slate-800"><i class="fas fa-list mr-2 text-slate-400"></i>Histórico</h3></div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-xs uppercase font-semibold border-b border-slate-100">
                                <th class="p-4">Descrição</th><th class="p-4">Categoria</th><th class="p-4">Conta</th><th class="p-4">Valor</th><th class="p-4 text-center">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-transacoes" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

        </div>

    </main>

    <script>
        // 1. CONFIGURAÇÃO DO FIREBASE (Com as suas chaves exclusivas)
        const firebaseConfig = {
            apiKey: "AIzaSyAaaAFp6gC4nOuj4RlC4HZhPZo5ffHQUI4",
            authDomain: "financasapp-5de18.firebaseapp.com",
            projectId: "financasapp-5de18",
            storageBucket: "financasapp-5de18.firebasestorage.app",
            messagingSenderId: "789455207825",
            appId: "1:789455207825:web:bd1e9cce13a313b4fc2e30"
        };

        // Inicializa os serviços do Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Variáveis globais de controle
        let usuarioAtual = null;
        let transacoes = [];
        let grafico = null;
        const bancosCadastrados = ['Nubank', 'Itaú', 'Inter', 'Carteira'];

// 1. CONFIGURAÇÃO DO FIREBASE (Chave corrigida!)
        const firebaseConfig = {
            apiKey: "AIzaSyAaaAFp6gC4nOuj4R1c4HZhPZo5ffHQUI4",
            authDomain: "financasapp-5de18.firebaseapp.com",
            projectId: "financasapp-5de18",
            storageBucket: "financasapp-5de18.firebasestorage.app",
            messagingSenderId: "789455207825",
            appId: "1:789455207825:web:bd1e9cce13a313b4fc2e30"
        };
        
        // Monitora em tempo real se o usuário logou ou deslogou
        auth.onAuthStateChanged(user => {
            const telaLogin = document.getElementById('tela-login');
            const painelSistema = document.getElementById('painel-sistema');
            const userInfo = document.getElementById('user-info');
            const badgeOffline = document.getElementById('badge-offline');

            if (user) {
                // Usuário Logado
                usuarioAtual = user;
                telaLogin.classList.add('hidden');
                painelSistema.classList.remove('hidden');
                userInfo.classList.remove('hidden');
                badgeOffline.classList.add('hidden');
                document.getElementById('user-email').innerText = user.email;
                
                // Carrega os dados da nuvem
                carregarTransacoesNuvem();
            } else {
                // Usuário Deslogado
                usuarioAtual = null;
                transacoes = [];
                telaLogin.classList.remove('hidden');
                painelSistema.classList.add('hidden');
                userInfo.classList.add('hidden');
                badgeOffline.classList.remove('hidden');
            }
        });

        // Função para Logar
        function processarAutenticacao(event) {
            event.preventDefault();
            esconderErro();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            auth.signInWithEmailAndPassword(email, senha)
                .catch(error => mostrarErro("E-mail ou senha incorretos."));
        }

        // Função para Criar Conta
        function criarConta() {
            esconderErro();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if(!email || !senha) {
                mostrarErro("Preencha e-mail e senha para criar a conta.");
                return;
            }
            if(senha.length < 6) {
                mostrarErro("A senha deve ter pelo menos 6 caracteres.");
                return;
            }

            auth.createUserWithEmailAndPassword(email, senha)
                .catch(error => mostrarErro("Erro ao criar conta. E-mail já existe ou inválido."));
        }

        // Função para Sair
        function fazerLogout() { auth.signOut(); }

        function mostrarErro(msg) {
            const el = document.getElementById('msg-erro');
            el.innerText = msg;
            el.classList.remove('hidden');
        }
        function esconderErro() { document.getElementById('msg-erro').classList.add('hidden'); }


        // ================= LÓGICA DO BANCO DE DADOS (FIRESTORE) =================

        // Busca os lançamentos do usuário em tempo real
        function carregarTransacoesNuvem() {
            if (!usuarioAtual) return;

            // Busca na coleção 'transacoes' apenas os documentos que pertencem a este UID
            db.collection("transacoes")
                .where("userId", "==", usuarioAtual.uid)
                .orderBy("data", "desc")
                .onSnapshot((snapshot) => {
                    transacoes = [];
                    snapshot.forEach((doc) => {
                        // Guarda os dados e o ID único do documento no Firestore
                        transacoes.push({ id: doc.id, ...doc.data() });
                    });
                    atualizarInterface();
                });
        }

        // Adiciona um novo documento na nuvem
        function adicionarTransacaoNuvem(event) {
            event.preventDefault();
            if (!usuarioAtual) return;

            const novaTransacao = {
                userId: usuarioAtual.uid, // Associa o gasto ao usuário logado
                desc: document.getElementById('desc').value,
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value,
                banco: document.getElementById('banco').value,
                data: new Date().toISOString()
            };

            // Envia para o Firestore
            db.collection("transacoes").add(novaTransacao)
                .then(() => {
                    document.getElementById('desc').value = '';
                    document.getElementById('valor').value = '';
                    document.getElementById('desc').focus();
                })
                .catch(err => alert("Erro ao salvar: " + err));
        }

        // Deleta um documento específico da nuvem pelo ID
        function deletarTransacaoNuvem(docId) {
            db.collection("transacoes").doc(docId).delete();
        }


        // ================= LÓGICA VISUAL E CÁLCULOS (INTERFACE) =================

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        }

        function atualizarInterface() {
            let saldo = 0; let receitas = 0; let despesas = 0;
            let saldoBancos = { 'Nubank': 0, 'Itaú': 0, 'Inter': 0, 'Carteira': 0 };
            let gastosCategoria = {};

            const tbody = document.getElementById('tabela-transacoes');
            tbody.innerHTML = '';

            transacoes.forEach((t) => {
                const val = t.valor;
                if (t.tipo === 'receita') {
                    receitas += val; saldo += val;
                    if(saldoBancos[t.banco] !== undefined) saldoBancos[t.banco] += val;
                } else {
                    despesas += val; saldo -= val;
                    if(saldoBancos[t.banco] !== undefined) saldoBancos[t.banco] -= val;
                    gastosCategoria[t.categoria] = (gastosCategoria[t.categoria] || 0) + val;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50";
                const cor = t.tipo === 'receita' ? 'text-emerald-600 font-semibold' : 'text-rose-600 font-semibold';
                const sinal = t.tipo === 'receita' ? '+' : '-';

                tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-800">${t.desc}</td>
                    <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs">${t.categoria}</span></td>
                    <td class="p-4 text-slate-500">${t.banco}</td>
                    <td class="p-4 ${cor}">${sinal} ${formatarMoeda(val)}</td>
                    <td class="p-4 text-center">
                        <button onclick="deletarTransacaoNuvem('${t.id}')" class="text-slate-300 hover:text-rose-500 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            if(transacoes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400">Nenhum lançamento cadastrado na nuvem.</td></tr>`;
            }

            document.getElementById('saldo-total').innerText = formatarMoeda(saldo);
            document.getElementById('total-receitas').innerText = formatarMoeda(receitas);
            document.getElementById('total-despesas').innerText = formatarMoeda(despesas);

            const divBancos = document.getElementById('lista-bancos');
            divBancos.innerHTML = '';
            bancosCadastrados.forEach(banco => {
                const v = saldoBancos[banco];
                const cor = v >= 0 ? 'text-slate-800' : 'text-rose-600';
                divBancos.innerHTML += `
                    <div class="bg-cardbg p-3 rounded-lg border border-slate-100 shadow-sm text-center">
                        <p class="text-xs text-slate-400 font-medium">${banco}</p>
                        <p class="text-sm font-bold ${cor} mt-0.5">${formatarMoeda(v)}</p>
                    </div>`;
            });

            atualizarGrafico(gastosCategoria);
        }

        function atualizarGrafico(dados) {
            const ctx = document.getElementById('graficoCategorias').getContext('2d');
            const labels = Object.keys(dados); const data = Object.values(dados);
            if (grafico) grafico.destroy();

            if (labels.length === 0) {
                grafico = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['Sem Despesas'], datasets: [{ data: [1], backgroundColor: ['#e2e8f0'] }] },
                    options: { plugins: { legend: { display: false } } }
                }); return;
            }

            grafico = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: ['#f43f5e', '#8b5cf6', '#06b6d4', '#10b981', '#f59e0b', '#64748b'], borderWidth: 0 }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } }
            });
        }
    </script>
</body>
</html>
